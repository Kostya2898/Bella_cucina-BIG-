{% extends "base.html" %}
{% block title %}QR-код меню — Bella Cucina{% endblock %}
{% block content %}
<div style="max-width:500px; margin:0 auto; text-align:center;">
    <div class="content-center">
        <div style="font-size:2.5rem; margin-bottom:1rem;">📱</div>
        <h1 style="margin-bottom:0.75rem;">QR-код меню</h1>
        <p style="color:#aaa; margin-bottom:2rem; font-size:0.95rem;">
            Відскануйте QR-код, щоб відкрити меню на смартфоні. Роздрукуйте і розмістіть на столиках.
        </p>

        <div style="background:#0a0e27; padding:1.5rem; border-radius:12px; border:2px solid rgba(212,175,55,0.3); display:inline-block; margin-bottom:1.5rem;">
            <img src="data:image/png;base64,{{ qr_b64 }}" alt="QR код меню" style="width:220px; height:220px; display:block;">
        </div>

        <p style="color:#888; font-size:0.85rem; margin-bottom:1.5rem; word-break:break-all;">{{ menu_url }}</p>

        <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;">
            <a href="{{ url_for('menu') }}" class="btn btn-secondary">← До меню</a>
            <a href="data:image/png;base64,{{ qr_b64 }}" download="bella_cucina_qr.png" class="btn">⬇️ Завантажити QR</a>
        </div>
    </div>
</div>
{% endblock %}
